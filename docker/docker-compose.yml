services:
  # ─── Oracle Database ─────────────────────────────────────
  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: mlops-db
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-SecurePass123}
      APP_USER: ${ORACLE_USER:-mlops_admin}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-SecurePass123}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── MLOps FastAPI Application ───────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mlops-inference-api
    ports:
      - "8000:8000"
    environment:
      # Database Connection Strings (Use TNS name if using wallet)
      DATABASE_URL: ${DATABASE_URL:-oracle+oracledb://mlops_admin:SecurePass123@db:1521/?service_name=XEPDB1}
      ORACLE_WALLET_DIR: ${ORACLE_WALLET_DIR:-}
      MODEL_NAME: ${MODEL_NAME:-sentiment-analysis-v1}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.5}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      # Mount secrets directory (if it exists locally) to support Oracle Wallet
      - ../secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle-data:
